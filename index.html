<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打字练习 - 宠物养成</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 50%, #fefce8 100%);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.container { text-align: center; padding: 20px; }
.emoji { font-size: 80px; margin-bottom: 16px; }
.title { font-size: 36px; font-weight: 800; color: #1e293b; margin-bottom: 4px; }
.subtitle { font-size: 16px; color: #64748b; margin-bottom: 40px; }
.btns { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
.btn {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 40px 48px; border-radius: 20px; border: 2px solid transparent;
  cursor: pointer; text-decoration: none; transition: all 0.2s; min-width: 200px;
}
.btn-student { background: #fff; border-color: #e2e8f0; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
.btn-student:hover { border-color: #0ea5e9; transform: translateY(-4px); box-shadow: 0 12px 36px rgba(14,165,233,0.15); }
.btn-teacher { background: #fff; border-color: #e2e8f0; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
.btn-teacher:hover { border-color: #f59e0b; transform: translateY(-4px); box-shadow: 0 12px 36px rgba(245,158,11,0.15); }
.btn-icon { font-size: 48px; }
.btn-label { font-size: 22px; font-weight: 700; color: #334155; }
.btn-hint { font-size: 13px; color: #94a3b8; }
</style>
</head>
<body>
<div class="container">
  <div class="emoji">⌨️🐱</div>
  <div class="title">打字练习</div>
  <div class="subtitle">小学生打字 · 宠物养成 · 班级排行</div>
  <div class="btns">
    <a href="student.html" class="btn btn-student">
      <span class="btn-icon">🎒</span>
      <span class="btn-label">我是学生</span>
      <span class="btn-hint">开始打字练习</span>
    </a>
    <a href="teacher.html" class="btn btn-teacher">
      <span class="btn-icon">👩‍🏫</span>
      <span class="btn-label">我是老师</span>
      <span class="btn-hint">管理班级与练习</span>
    </a>
  </div>
</div>
</body>
</html>

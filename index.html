<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打字练习 - 入口</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #e0f2fe, #f0fdf4, #fefce8);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.card {
  background: #fff; border-radius: 24px; padding: 48px 40px;
  box-shadow: 0 4px 32px rgba(0,0,0,0.08); text-align: center; max-width: 480px; width: 92%;
}
.emoji { font-size: 64px; margin-bottom: 12px; }
.title { font-size: 28px; font-weight: 800; color: #1e293b; margin-bottom: 4px; }
.subtitle { font-size: 15px; color: #94a3b8; margin-bottom: 36px; }
.btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.btn {
  flex: 1; min-width: 160px; display: flex; flex-direction: column; align-items: center;
  gap: 8px; padding: 28px 24px; border-radius: 16px; border: 2px solid #e2e8f0;
  text-decoration: none; transition: all 0.2s; background: #fff;
}
.btn:hover { transform: translateY(-4px); }
.btn-student:hover { border-color: #0ea5e9; box-shadow: 0 8px 24px rgba(14,165,233,0.15); }
.btn-teacher:hover { border-color: #f59e0b; box-shadow: 0 8px 24px rgba(245,158,11,0.15); }
.btn-icon { font-size: 40px; }
.btn-label { font-size: 18px; font-weight: 700; color: #334155; }
.btn-hint { font-size: 13px; color: #94a3b8; }
.footer { margin-top: 32px; font-size: 12px; color: #cbd5e1; }
</style>
</head>
<body>
<div class="card">
  <div class="emoji">⌨️🐱</div>
  <div class="title">打字练习</div>
  <div class="subtitle">小学生打字 · 宠物养成 · 班级排行</div>
  <div class="btns">
    <a href="student.html" class="btn btn-student">
      <span class="btn-icon">🎒</span>
      <span class="btn-label">我是学生</span>
      <span class="btn-hint">开始打字练习</span>
    </a>
    <a href="teacher.html" class="btn btn-teacher">
      <span class="btn-icon">👩‍🏫</span>
      <span class="btn-label">我是老师</span>
      <span class="btn-hint">班级管理与练习</span>
    </a>
  </div>
</div>
<div class="footer">学生端 · 教师端 · 统一入口</div>
</body>
</html>

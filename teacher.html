<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教师工作台 - 宠物打字</title>
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
  --font-size-xs: 12px;
  --font-size-sm: 14px;
  --font-size-base: 16px;
  --font-size-lg: 18px;
  --font-size-xl: 22px;
  --font-size-2xl: 28px;
  --line-height: 1.65;
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
  --transition-fast: 0.15s ease;
  --transition-normal: 0.25s ease;
}

[data-theme="ocean"] {
  --color-bg: #F0F7FA;
  --color-surface: #E3F1F7;
  --color-border: #C5DFF0;
  --color-border-hover: #9CC4DD;
  --color-text-primary: #1B3A4B;
  --color-text-secondary: #4A7C96;
  --color-text-muted: #7BA3B8;
  --color-accent: #0EA5E9;
  --color-accent-light: #E0F5FF;
  --color-accent-dark: #0284C7;
  --color-success: #10B981;
  --color-success-light: #ECFDF5;
  --color-error: #EF4444;
  --color-error-light: #FEF2F2;
  --color-warning: #F59E0B;
}
[data-theme="forest"] {
  --color-bg: #F5F9F4; --color-surface: #E8F0E4; --color-border: #C8D8C0;
  --color-border-hover: #9DB88D; --color-text-primary: #1E2F1A; --color-text-secondary: #5C7A50;
  --color-text-muted: #8AA380; --color-accent: #4ADE80; --color-accent-light: #ECFDF3;
  --color-accent-dark: #16A34A; --color-success: #22C55E; --color-success-light: #F0FAE8;
  --color-error: #DC2626; --color-error-light: #FEF2F2; --color-warning: #F59E0B;
}
[data-theme="space"] {
  --color-bg: #0F0B1A; --color-surface: #1A1530; --color-border: #2D2650;
  --color-border-hover: #4A3D75; --color-text-primary: #E8E4F0; --color-text-secondary: #9B8FC0;
  --color-text-muted: #6E5F9E; --color-accent: #A78BFA; --color-accent-light: #2D2040;
  --color-accent-dark: #7C3AED; --color-success: #34D399; --color-success-light: #0A2F20;
  --color-error: #F87171; --color-error-light: #2F0A0A; --color-warning: #FBBF24;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3); --shadow-md: 0 4px 12px rgba(0,0,0,0.3); --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
}
[data-theme="candy"] {
  --color-bg: #FFF5F7; --color-surface: #FFF0F3; --color-border: #F5D0D8;
  --color-border-hover: #E8A8B5; --color-text-primary: #4A1528; --color-text-secondary: #9B4E63;
  --color-text-muted: #C97D8E; --color-accent: #F472B6; --color-accent-light: #FDE6F0;
  --color-accent-dark: #DB2777; --color-success: #34D399; --color-success-light: #ECFDF5;
  --color-error: #F87171; --color-error-light: #FEF2F2; --color-warning: #FBBF24;
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-family); font-size: var(--font-size-base);
  line-height: var(--line-height); color: var(--color-text-primary);
  background: var(--color-bg); min-height: 100vh;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea { font-family: inherit; font-size: inherit; }
.hidden { display: none !important; }

/* ===== APP CONTAINER ===== */
.app-container { max-width: 960px; margin: 0 auto; padding: var(--space-md); }

/* ===== HEADER ===== */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-md) 0; gap: var(--space-md); flex-wrap: wrap;
}
.header-left { display: flex; align-items: center; gap: var(--space-md); }
.app-title { font-size: var(--font-size-xl); font-weight: 700; color: var(--color-accent); }
.nav-tabs { display: flex; gap: var(--space-xs); }
.nav-tab {
  padding: var(--space-sm) var(--space-md); border-radius: var(--radius-full);
  font-size: var(--font-size-sm); color: var(--color-text-secondary);
  transition: all var(--transition-fast); white-space: nowrap;
  border: 1px solid var(--color-border);
}
.nav-tab:hover { background: var(--color-accent-light); color: var(--color-accent-dark); border-color: var(--color-accent); }
.nav-tab.active { background: var(--color-accent); color: #fff; border-color: var(--color-accent); font-weight: 600; }
.header-right { display: flex; align-items: center; gap: var(--space-sm); }
.btn-account {
  display: flex; align-items: center; gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md); border-radius: var(--radius-full);
  background: var(--color-surface); border: 1px solid var(--color-border);
  font-size: var(--font-size-sm); color: var(--color-text-primary);
  transition: all var(--transition-fast);
}
.btn-account:hover { border-color: var(--color-accent); background: var(--color-accent-light); }
.btn-account .avatar { font-size: var(--font-size-lg); }
.btn-account .username { max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* 账号下拉菜单 */
.account-wrap { position: relative; }
.account-dropdown {
  position: absolute; top: calc(100% + 6px); right: 0; z-index: 100;
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); box-shadow: var(--shadow-lg);
  min-width: 140px; overflow: hidden;
}
.account-dropdown.hidden { display: none; }
@keyframes dropdownIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.dropdown-item {
  display: block; width: 100%; padding: var(--space-sm) var(--space-md);
  font-size: var(--font-size-sm); color: var(--color-text-primary);
  text-align: left; transition: background var(--transition-fast);
}
.dropdown-item:hover { background: var(--color-accent-light); }
.dropdown-item.danger { color: var(--color-error); }

/* ===== ACCOUNT MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  animation: fadeInOverlay 0.2s ease;
}
@keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
.account-card {
  background: var(--color-surface); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); width: 380px; max-width: 95vw;
  padding: var(--space-xl); position: relative;
  animation: fadeInUp 0.25s ease;
}
@keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.account-close {
  position: absolute; top: var(--space-md); right: var(--space-md);
  font-size: 20px; color: var(--color-text-muted); width: 32px; height: 32px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  transition: all var(--transition-fast);
}
.account-close:hover { background: var(--color-border); color: var(--color-text-primary); }
.account-tabs { display: flex; gap: 0; margin-bottom: var(--space-lg); border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--color-border); }
.account-tab {
  flex: 1; padding: var(--space-sm) var(--space-md); text-align: center;
  font-size: var(--font-size-sm); font-weight: 600; color: var(--color-text-secondary);
  background: var(--color-bg); transition: all var(--transition-fast);
}
.account-tab.active { background: var(--color-accent); color: #fff; }
.form-group { margin-bottom: var(--space-md); }
.form-label { display: block; font-size: var(--font-size-sm); color: var(--color-text-secondary); margin-bottom: var(--space-xs); }
.form-input {
  width: 100%; padding: var(--space-sm) var(--space-md); font-size: var(--font-size-base);
  border: 1px solid var(--color-border); border-radius: var(--radius-sm);
  background: var(--color-bg); color: var(--color-text-primary);
  transition: border-color var(--transition-fast);
}
.form-input:focus { outline: none; border-color: var(--color-accent); }
.form-error { font-size: var(--font-size-xs); color: var(--color-error); margin-top: var(--space-xs); display: none; }
.form-check { display: flex; align-items: center; gap: var(--space-sm); margin-bottom: var(--space-md); }
.form-check input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--color-accent); }
.form-check label { font-size: var(--font-size-sm); color: var(--color-text-secondary); }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md); font-size: var(--font-size-sm);
  border-radius: var(--radius-full); font-weight: 600;
  transition: all var(--transition-fast); white-space: nowrap;
}
.btn-primary { background: var(--color-accent); color: #fff; }
.btn-primary:hover { background: var(--color-accent-dark); }
.btn-secondary { background: var(--color-surface); color: var(--color-text-primary); border: 1px solid var(--color-border); }
.btn-secondary:hover { border-color: var(--color-accent); color: var(--color-accent); }
.btn-danger { background: var(--color-error); color: #fff; }
.btn-danger:hover { opacity: 0.85; }
.btn-outline { background: transparent; color: var(--color-accent); border: 1px solid var(--color-accent); }
.btn-outline:hover { background: var(--color-accent-light); }
.btn-sm { padding: var(--space-xs) var(--space-sm); font-size: var(--font-size-xs); border-radius: var(--radius-sm); }
.btn-lg { padding: var(--space-md) var(--space-xl); font-size: var(--font-size-lg); }
.btn-block { width: 100%; justify-content: center; }

/* ===== CARDS ===== */
.card {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-lg); padding: var(--space-lg);
  box-shadow: var(--shadow-sm);
}
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-md); flex-wrap: wrap; gap: var(--space-sm); }
.card-title { font-size: var(--font-size-lg); font-weight: 700; }

/* ===== CLASS CARD ===== */
.class-info-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: var(--space-md); margin-bottom: var(--space-lg);
}
.class-info-item {
  background: var(--color-bg); border-radius: var(--radius-md);
  padding: var(--space-md); text-align: center;
}
.class-info-item .label { font-size: var(--font-size-xs); color: var(--color-text-muted); margin-bottom: var(--space-xs); }
.class-info-item .value { font-size: var(--font-size-xl); font-weight: 700; color: var(--color-accent); }
.invite-code {
  font-family: monospace; font-size: var(--font-size-2xl); font-weight: 800;
  letter-spacing: 0.15em; color: var(--color-accent); cursor: pointer;
  padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md);
  background: var(--color-accent-light); display: inline-block;
  transition: all var(--transition-fast); user-select: all;
}
.invite-code:hover { background: var(--color-accent); color: #fff; }
.invite-code-sm {
  font-family: monospace; font-size: 13px; font-weight: 700;
  letter-spacing: 0.1em; color: var(--color-accent); cursor: pointer;
  padding: 2px 8px; border-radius: 4px; background: var(--color-accent-light);
  transition: all var(--transition-fast); user-select: none;
}
.invite-code-sm:hover { background: var(--color-accent); color: #fff; }
.class-row-active { background: #e0f2fe; }

/* ===== TABLES ===== */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: var(--space-sm) var(--space-md); text-align: left; font-size: var(--font-size-sm); }
th { color: var(--color-text-muted); font-weight: 600; border-bottom: 2px solid var(--color-border); white-space: nowrap; }
td { border-bottom: 1px solid var(--color-border); }
tr:hover td { background: var(--color-bg); }
.speed-fast { color: var(--color-success); font-weight: 700; }
.speed-mid { color: var(--color-warning); font-weight: 700; }
.speed-slow { color: var(--color-error); font-weight: 700; }

/* ===== EXERCISE LIST ===== */
.exercise-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-md); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); margin-bottom: var(--space-sm);
  background: var(--color-bg); gap: var(--space-md); flex-wrap: wrap;
}
.exercise-info { flex: 1; min-width: 200px; }
.exercise-info .ex-title { font-weight: 600; }
.exercise-info .ex-meta { font-size: var(--font-size-xs); color: var(--color-text-muted); }
.exercise-text-preview {
  font-size: var(--font-size-xs); color: var(--color-text-secondary);
  max-height: 40px; overflow: hidden; margin-top: var(--space-xs);
}
.exercise-actions { display: flex; gap: var(--space-sm); flex-shrink: 0; }

/* ===== DASHBOARD SUMMARY ===== */
.summary-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: var(--space-md); margin-bottom: var(--space-lg);
}
.summary-card {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-lg); padding: var(--space-lg); text-align: center;
}
.summary-card .summary-icon { font-size: 32px; margin-bottom: var(--space-sm); }
.summary-card .summary-value { font-size: var(--font-size-2xl); font-weight: 700; color: var(--color-accent); }
.summary-card .summary-label { font-size: var(--font-size-xs); color: var(--color-text-muted); }

/* ===== SECTION HEADER ===== */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-lg); flex-wrap: wrap; gap: var(--space-sm); }
.section-title { font-size: var(--font-size-xl); font-weight: 700; }

/* ===== FORMS (Teacher) ===== */
.form-textarea {
  width: 100%; padding: var(--space-sm) var(--space-md); font-size: var(--font-size-base);
  border: 1px solid var(--color-border); border-radius: var(--radius-sm);
  background: var(--color-bg); color: var(--color-text-primary);
  resize: vertical; min-height: 100px; line-height: var(--line-height);
  transition: border-color var(--transition-fast);
}
.form-textarea:focus { outline: none; border-color: var(--color-accent); }
.form-inline { display: flex; gap: var(--space-sm); align-items: flex-end; flex-wrap: wrap; }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center; padding: var(--space-2xl) var(--space-md);
  color: var(--color-text-muted);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: var(--space-md); }
.empty-state .empty-text { font-size: var(--font-size-lg); margin-bottom: var(--space-md); }

/* ===== TOAST ===== */
.toast-container {
  position: fixed; top: var(--space-lg); left: 50%; transform: translateX(-50%);
  z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: var(--space-sm);
}
.toast-msg {
  background: var(--color-text-primary); color: var(--color-bg);
  padding: var(--space-sm) var(--space-lg); border-radius: var(--radius-full);
  font-size: var(--font-size-sm); box-shadow: var(--shadow-lg);
  animation: toastSlideIn 0.3s ease, toastSlideOut 0.3s ease 2.5s forwards;
  pointer-events: none;
}
@keyframes toastSlideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes toastSlideOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }

/* ===== THEME SWITCHER ===== */
.theme-btn {
  width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 18px; background: var(--color-surface); border: 1px solid var(--color-border);
  cursor: pointer; transition: all var(--transition-fast);
}
.theme-btn:hover { border-color: var(--color-accent); }
.theme-popup {
  position: absolute; top: calc(100% + 6px); right: 0; z-index: 100;
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); box-shadow: var(--shadow-lg);
  padding: var(--space-sm); display: none; gap: var(--space-sm);
}
.theme-popup.show { display: flex; }
.theme-wrap { position: relative; }
.theme-option {
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all var(--transition-fast);
}
.theme-option:hover, .theme-option.active { border-color: var(--color-accent); }
.theme-swatch-ocean { background: linear-gradient(135deg, #0EA5E9, #E0F5FF); }
.theme-swatch-forest { background: linear-gradient(135deg, #4ADE80, #ECFDF3); }
.theme-swatch-space { background: linear-gradient(135deg, #A78BFA, #1A1530); }
.theme-swatch-candy { background: linear-gradient(135deg, #F472B6, #FFF0F3); }

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .app-header { flex-direction: column; align-items: stretch; }
  .header-left { flex-direction: column; align-items: stretch; }
  .nav-tabs { overflow-x: auto; }
  .class-info-grid { grid-template-columns: 1fr 1fr; }
  .summary-grid { grid-template-columns: 1fr 1fr; }
  .exercise-item { flex-direction: column; align-items: stretch; }
  .exercise-actions { justify-content: flex-end; }
}
</style>
</head>
<body data-theme="ocean">

<!-- 主题切换器 -->
<div style="display:flex;justify-content:flex-end;padding:8px 16px 0;">
  <div class="theme-wrap">
    <button class="theme-btn" id="btn-theme" title="切换主题">🎨</button>
    <div class="theme-popup" id="theme-popup">
      <button class="theme-option theme-swatch-ocean active" data-theme="ocean" title="海洋"></button>
      <button class="theme-option theme-swatch-forest" data-theme="forest" title="森林"></button>
      <button class="theme-option theme-swatch-space" data-theme="space" title="星空"></button>
      <button class="theme-option theme-swatch-candy" data-theme="candy" title="糖果"></button>
    </div>
  </div>
</div>

<div class="app-container">
  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <span class="app-title">📚 教师工作台</span>
      <nav class="nav-tabs" id="nav-tabs">
        <button class="nav-tab active" data-tab="class">🏫 班级管理</button>
        <button class="nav-tab" data-tab="exercise">📝 练习分发</button>
        <button class="nav-tab" data-tab="dashboard">📊 学情看板</button>
        <button class="nav-tab" data-tab="pet">🐱 宠物排行</button>
      </nav>
    </div>
    <div class="header-right">
      <div class="account-wrap">
        <button class="btn-account" id="btn-account">
          <span class="avatar">👤</span>
          <span class="username" id="label-username">未登录</span>
          <span>▾</span>
        </button>
        <div class="account-dropdown hidden" id="account-dropdown">
          <button class="dropdown-item danger" id="btn-logout">退出登录</button>
        </div>
      </div>
    </div>
  </header>

  <!-- ACCOUNT MODAL -->
  <div class="modal-overlay hidden" id="modal-account">
    <div class="account-card">
      <button class="account-close" id="btn-account-close">✕</button>
      <div class="account-tabs" id="account-tabs">
        <button class="account-tab active" data-form="login">登录</button>
        <button class="account-tab" data-form="register">注册</button>
      </div>
      <!-- Login Form -->
      <form id="account-form-login">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input class="form-input" type="text" id="login-username" placeholder="请输入用户名" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input class="form-input" type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <div class="form-check" style="margin-bottom:4px;">
          <input type="checkbox" id="login-as-student">
          <label for="login-as-student">🎒 我是学生</label>
        </div>
        <div class="form-check" style="margin-bottom:8px;">
          <input type="checkbox" id="login-as-teacher" checked>
          <label for="login-as-teacher">👨‍🏫 我是老师</label>
        </div>
        <div class="form-error" id="login-error"></div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">登 录</button>
      </form>
      <!-- Register Form -->
      <form class="hidden" id="account-form-register">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input class="form-input" type="text" id="reg-username" placeholder="2-20个字符" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input class="form-input" type="password" id="reg-password" placeholder="3-50个字符" autocomplete="new-password">
        </div>
        <div class="form-check">
          <input type="checkbox" id="reg-is-teacher">
          <label for="reg-is-teacher">我是老师（注册教师账号）</label>
        </div>
        <div class="form-error" id="reg-error"></div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">注 册</button>
      </form>
    </div>

  if (AccountUser.token) { refreshTeacherData(); }

  var label = document.getElementById('label-username');

function showAccountModal(tab) {
  document.getElementById('modal-account').classList.remove('hidden');
  switchAccountTab(tab || 'login');
}

function hideAccountModal() {
  document.getElementById('modal-account').classList.add('hidden');
}

function switchAccountTab(tab) {
  var tabs = document.querySelectorAll('#account-tabs .account-tab');
  tabs.forEach(function(t) { t.classList.toggle('active', t.dataset.form === tab); });
  document.getElementById('account-form-login').classList.toggle('hidden', tab !== 'login');

  if (tab === 'login') {
    document.getElementById('login-as-student').checked = false;
    document.getElementById('login-as-teacher').checked = true;
  }
}

async function accountLogin(username, password) {
  var data = await accountAPI('POST', '/api/login', { username: username, password: password });
  AccountUser.token = data.token;
  AccountUser.userId = data.userId;
  AccountUser.username = data.username;
  AccountUser.role = data.role || 'student';
  saveAccount();
  updateAccountUI();
  hideAccountModal();
  showToast('登录成功');
  if (AccountUser.role === 'teacher') {
    refreshTeacherData();
  } else {
    showToast('✅ 学生登录成功，正在跳转...');
    setTimeout(function() { location.href = 'index.html'; }, 800);
  }
}

async function accountRegister(username, password, isTeacher) {
  var role = isTeacher ? 'teacher' : 'student';
  var data = await accountAPI('POST', '/api/register', { username: username, password: password, role: role });
  AccountUser.token = data.token;
  AccountUser.userId = data.userId;
  AccountUser.username = data.username;
  AccountUser.role = data.role || 'student';
  saveAccount();
  updateAccountUI();
  hideAccountModal();
  showToast('注册成功');
  if (AccountUser.role === 'teacher') {
    refreshTeacherData();
  } else {
    showToast('✅ 学生注册成功，正在跳转...');
    setTimeout(function() { location.href = 'index.html'; }, 800);
  }
}

function accountLogout() {
  AccountUser = { token: '', userId: '', username: '', role: '' };
  saveAccount();
  updateAccountUI();
  document.getElementById('account-dropdown').classList.add('hidden');
  // 清空教师数据
  TeacherState.classData = null;
  TeacherState.dashboardData = null;
  TeacherState.petRankingData = null;
  renderCurrentTab();
  showToast('已退出登录');
}

// ===== 教师状态 =====
var TeacherState = { classList: [], currentClassId: null, classData: null, dashboardData: null, petRankingData: null, petRankMode: 'xp', currentTab: 'class' };

// ===== 班级切换 =====
async function loadClassList() {
  try {
    var data = await accountAPI('GET', '/api/class/list');
    TeacherState.classList = data.classes || [];
  } catch(e) {
    TeacherState.classList = [];
  }
  if (TeacherState.classList.length > 0) {
    if (!TeacherState.currentClassId || !TeacherState.classList.find(function(c) { return c.classId === TeacherState.currentClassId; })) {
      TeacherState.currentClassId = TeacherState.classList[0].classId;
    }
  } else {
    TeacherState.currentClassId = null;
  }
  renderClassSwitcher();
  if (TeacherState.currentTab === 'class') renderClassTab();
}

function renderClassSwitcher() {
  var bar = document.getElementById('class-switcher-bar');
  var sel = document.getElementById('class-switcher-select');
  var info = document.getElementById('class-switcher-info');
  if (TeacherState.classList.length <= 1) {
    bar.classList.add('hidden');
    return;
  }
  bar.classList.remove('hidden');
  sel.innerHTML = TeacherState.classList.map(function(c) {
    return '<option value="' + c.classId + '"' + (c.classId === TeacherState.currentClassId ? ' selected' : '') + '>' + c.name + '（' + c.studentCount + '人）</option>';
  }).join('');
  var cur = TeacherState.classList.find(function(c) { return c.classId === TeacherState.currentClassId; });
  if (cur) info.textContent = '邀请码：' + cur.inviteCode;
}

async function switchClass(classId) {
  TeacherState.currentClassId = classId;
  renderClassSwitcher();
  await loadClassInfo();
}

// ===== 教师 API =====
async function createClass(name) {
  var data = await accountAPI('POST', '/api/class/create', { name: name });
  showToast('班级创建成功！邀请码：' + data.inviteCode);
  await loadClassList();
  TeacherState.currentClassId = data.classId;
  renderClassSwitcher();
  await loadClassInfo();
}

async function loadClassInfo() {
  var cid = TeacherState.currentClassId;
  if (!cid) {
    TeacherState.classData = null;
    renderCurrentTab();
    return;
  }
  try {
    var data = await accountAPI('GET', '/api/class/info?classId=' + cid);
    TeacherState.classData = data;
  } catch(e) {
    TeacherState.classData = null;
  }
  renderCurrentTab();
}

async function removeStudent(studentId) {
  if (!confirm('确定要移除该学生吗？学生数据不会丢失，可重新加入班级。')) return;
  await accountAPI('POST', '/api/class/remove-student', { studentId: studentId, classId: TeacherState.currentClassId });
  showToast('已移除学生');
  await loadClassInfo();
}

// 编辑学生信息弹窗
function showEditStudentModal(studentId, studentName, currentStudentNo) {
  document.getElementById('edit-st-id').value = studentId;
  document.getElementById('edit-st-name-label').textContent = studentName;
  document.getElementById('edit-st-sno-label').textContent = currentStudentNo || '无';
  document.getElementById('edit-st-sno').value = currentStudentNo || '';
  document.getElementById('edit-st-username').value = studentName;
  document.getElementById('edit-st-error').classList.add('hidden');
  document.getElementById('modal-edit-student').classList.remove('hidden');
}

function closeEditStudentModal() {
  document.getElementById('modal-edit-student').classList.add('hidden');
}

async function saveEditStudent() {
  var studentId = document.getElementById('edit-st-id').value;
  var newSno = document.getElementById('edit-st-sno').value.trim();
  var newUsername = document.getElementById('edit-st-username').value.trim();
  var errEl = document.getElementById('edit-st-error');

  if (!newSno) { errEl.textContent = '请输入学号'; errEl.classList.remove('hidden'); return; }
  if (newSno.length > 30) { errEl.textContent = '学号不能超过30个字符'; errEl.classList.remove('hidden'); return; }
  if (!newUsername || newUsername.length < 2 || newUsername.length > 20) { errEl.textContent = '用户名需要2-20个字符'; errEl.classList.remove('hidden'); return; }

  try {
    // 保存学号
    await accountAPI('POST', '/api/class/update-student', { studentId: studentId, classId: TeacherState.currentClassId, action: 'updateStudentNo', studentNo: newSno });
    // 如果用户名有变化，保存用户名
    var oldName = document.getElementById('edit-st-name-label').textContent;
    if (newUsername !== oldName) {
      await accountAPI('POST', '/api/class/update-student', { studentId: studentId, classId: TeacherState.currentClassId, action: 'updateUsername', username: newUsername });
    }
    showToast('学生信息已更新');
    closeEditStudentModal();
    await loadClassInfo();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

async function resetPasswordInModal() {
  var studentId = document.getElementById('edit-st-id').value;
  var studentName = document.getElementById('edit-st-name-label').textContent;
  if (!confirm('确定要将「' + studentName + '」的密码重置为 123456 吗？')) return;
  try {
    await accountAPI('POST', '/api/class/update-student', { studentId: studentId, classId: TeacherState.currentClassId, action: 'resetPassword' });
    showToast(studentName + ' 的密码已重置为 123456');
  } catch(e) {
    showToast('重置失败：' + e.message);
  }
}

async function removeStudentFromModal() {
  var studentId = document.getElementById('edit-st-id').value;
  var studentName = document.getElementById('edit-st-name-label').textContent;
  if (!confirm('确定要将「' + studentName + '」移出班级吗？学生数据不会丢失，可重新加入。')) return;
  await accountAPI('POST', '/api/class/remove-student', { studentId: studentId, classId: TeacherState.currentClassId });
  showToast('已移除 ' + studentName);
  closeEditStudentModal();
  await loadClassInfo();
}

async function createExercise(title, text) {
  var data = await accountAPI('POST', '/api/class/exercise/create', { title: title, text: text, classId: TeacherState.currentClassId });
  showToast('练习创建成功');
  await loadClassInfo();
  return data;
}

async function distributeExercise(exerciseId) {
  var data = await accountAPI('POST', '/api/class/exercise/distribute', { exerciseId: exerciseId, classId: TeacherState.currentClassId });
  showToast('已分发给 ' + data.count + ' 名学生');
}

async function deleteExercise(exerciseId) {
  if (!confirm('确定要删除该练习吗？将从所有学生端清除。')) return;
  await accountAPI('POST', '/api/class/exercise/delete', { exerciseId: exerciseId, classId: TeacherState.currentClassId });
  showToast('练习已删除');
  await loadClassInfo();
}

async function loadDashboard() {
  var cid = TeacherState.currentClassId;
  if (!cid) {
    TeacherState.dashboardData = null;
    renderDashboard();
    return;
  }
  try {
    var data = await accountAPI('GET', '/api/class/dashboard?classId=' + cid);
    TeacherState.dashboardData = data;
  } catch(e) {
    TeacherState.dashboardData = null;
  }
  renderDashboard();
}

async function refreshTeacherData() {
  if (!AccountUser.token || AccountUser.role !== 'teacher') return;
  try {
    await loadClassList();
    await loadClassInfo();
    if (TeacherState.classData) {
      await loadDashboard();
      await loadPetLeaderboard();
    }
  } catch(e) {}
}

// ===== 渲染 =====
function switchTab(tab) {
  TeacherState.currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  document.getElementById('tab-class').classList.toggle('hidden', tab !== 'class');
  document.getElementById('tab-exercise').classList.toggle('hidden', tab !== 'exercise');
  document.getElementById('tab-dashboard').classList.toggle('hidden', tab !== 'dashboard');
  document.getElementById('tab-pet').classList.toggle('hidden', tab !== 'pet');

  renderCurrentTab();
}

function renderCurrentTab() {
  if (TeacherState.currentTab === 'class') renderClassTab();
  else if (TeacherState.currentTab === 'exercise') renderExerciseTab();
  else if (TeacherState.currentTab === 'dashboard') renderDashboard();
  else if (TeacherState.currentTab === 'pet') {
    if (!TeacherState.petRankingData) loadPetLeaderboard();
    else renderPetRanking();
  }
}

  tableEmpty.classList.add('hidden');

function copyInviteCodeStr(code) {
  if (!code) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(function() { showToast('邀请码已复制：' + code); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = code; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('邀请码已复制：' + code);
  }
}

// ---- CSV 导出 ----
function exportCSV() {
  var data = TeacherState.dashboardData;
  if (!data || !data.students || data.students.length === 0) {
    showToast('没有数据可导出');
    return;
  }
  var header = ['学号', '姓名', '练习次数', '教师练习', '平均速度(字/分)', '最高速度(字/分)', '正确率(%)', '活跃天数', '经验值', '星星', '宠物领养', '满级', '最后练习时间'];
  var rows = data.students.map(function(s) {
    var lastTime = s.lastPracticeAt ? new Date(s.lastPracticeAt).toLocaleString('zh-CN') : '暂无';
    var ep = s.exerciseProgress;
    var exText = ep ? ep.completed + '/' + ep.total : '-';
    var pet = s.pet || {};
    return [s.studentNo || '', s.username, s.totalPractices, exText, s.avgSpeed, s.maxSpeed, s.avgAccuracy, s.activeDays, pet.totalXP, pet.stars, pet.adoptedCount, pet.maxLevelCount, lastTime];
  });
  var csvContent = '﻿' + header.join(',') + '\n' + rows.map(function(r) { return r.join(','); }).join('\n');
  var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '学情看板_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV 已导出');
}

async function showTrendModal(studentId, studentName) {
  document.getElementById('trend-title').textContent = '📈 ' + studentName + ' 练习趋势';
  document.getElementById('modal-trend').classList.remove('hidden');
  document.getElementById('trend-empty').classList.add('hidden');
  var canvas = document.getElementById('trend-canvas');
  canvas.style.display = 'none';

  try {
    var data = await accountAPI('GET', '/api/class/student-records?studentId=' + studentId);
    if (!data.records || data.records.length === 0) {
      document.getElementById('trend-empty').classList.remove('hidden');
      return;
    }
    canvas.style.display = 'block';
    drawTrendChart(canvas, data.records);
  } catch(e) {
    document.getElementById('trend-empty').classList.remove('hidden');
  }
}

function drawTrendChart(canvas, records) {
  var ctx = canvas.getContext('2d');
  var W = canvas.width;
  var H = canvas.height;
  var pad = { top: 20, right: 30, bottom: 50, left: 50 };
  var pw = W - pad.left - pad.right;
  var ph = H - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, H);

  // 取最近最多30条记录
  var data = records.slice(-30);
  var n = data.length;

  // 计算Y轴范围
  var maxSpeed = 0, maxAcc = 100;
  data.forEach(function(r) { if (r.speed > maxSpeed) maxSpeed = r.speed; });
  maxSpeed = Math.max(maxSpeed, 10);
  maxSpeed = Math.ceil(maxSpeed / 10) * 10;

  // 辅助函数
  function x(i) { return pad.left + (i / Math.max(n - 1, 1)) * pw; }
  function ySpeed(v) { return pad.top + ph - (v / maxSpeed) * ph; }
  function yAcc(v) { return pad.top + ph - (v / 100) * ph; }

  // 网格线
  ctx.strokeStyle = '#e5e7eb';
  ctx.lineWidth = 1;
  for (var i = 0; i <= 4; i++) {
    var gy = pad.top + (ph / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(W - pad.right, gy); ctx.stroke();
  }

  // X轴标签
  ctx.fillStyle = '#6b7280';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  var maxLabels = Math.min(n, 8);
  var step = Math.max(1, Math.floor(n / maxLabels));
  for (var i = 0; i < n; i += step) {
    var d = new Date(data[i].time);
    var label = (d.getMonth() + 1) + '/' + d.getDate();
    ctx.fillText(label, x(i), H - pad.bottom + 16);
  }
  // 最后一条
  if (n > 1 && (n - 1) % step !== 0) {
    var d = new Date(data[n - 1].time);
    ctx.fillText((d.getMonth() + 1) + '/' + d.getDate(), x(n - 1), H - pad.bottom + 16);
  }

  // 左侧Y轴(速度)
  ctx.textAlign = 'right';
  ctx.fillStyle = '#0284c7';
  for (var i = 0; i <= 4; i++) {
    var v = Math.round((maxSpeed / 4) * (4 - i));
    ctx.fillText(v + '', pad.left - 8, pad.top + (ph / 4) * i + 4);
  }
  ctx.fillText('字/分', pad.left - 8, pad.top - 8);

  // 右侧Y轴(正确率)
  ctx.textAlign = 'left';
  ctx.fillStyle = '#dc2626';
  for (var i = 0; i <= 4; i++) {
    var v = 100 - i * 25;
    ctx.fillText(v + '%', W - pad.right + 8, pad.top + (ph / 4) * i + 4);
  }

  // 速度折线
  ctx.strokeStyle = '#0284c7';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (var i = 0; i < n; i++) {
    var px = x(i), py = ySpeed(data[i].speed);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.stroke();

  // 速度数据点
  ctx.fillStyle = '#0284c7';
  for (var i = 0; i < n; i++) {
    ctx.beginPath(); ctx.arc(x(i), ySpeed(data[i].speed), 3, 0, Math.PI * 2); ctx.fill();
  }

  // 正确率折线
  ctx.strokeStyle = '#dc2626';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([6, 3]);
  ctx.beginPath();
  for (var i = 0; i < n; i++) {
    var px = x(i), py = yAcc(data[i].accuracy);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // 正确率数据点
  ctx.fillStyle = '#dc2626';
  for (var i = 0; i < n; i++) {
    ctx.beginPath(); ctx.arc(x(i), yAcc(data[i].accuracy), 3, 0, Math.PI * 2); ctx.fill();
  }

  // 图例
  ctx.font = '12px sans-serif';
  var lx = pad.left, ly = pad.top + 4;
  ctx.fillStyle = '#0284c7';
  ctx.fillRect(lx, ly, 16, 3);
  ctx.fillText('速度(字/分)', lx + 22, ly + 8);

  ctx.fillStyle = '#dc2626';
  var lx2 = lx + 130;
  ctx.setLineDash([4, 2]);
  ctx.beginPath(); ctx.moveTo(lx2, ly + 1.5); ctx.lineTo(lx2 + 16, ly + 1.5); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillText('正确率(%)', lx2 + 22, ly + 8);
}

    e.preventDefault();

    var p = document.getElementById('reg-password').value;
    var isTeacher = document.getElementById('reg-is-teacher').checked;
    var err = document.getElementById('reg-error');

    tab.addEventListener('click', function() { switchTab(this.dataset.tab); });
  });

    var err = document.getElementById('create-class-error');
    if (!name || name.length < 2 || name.length > 30) {
      err.textContent = '班级名称需要2-30个字符'; return;
    }
    err.textContent = '';
    createClass(name).catch(function(e) { err.textContent = e.message; });

  document.getElementById('btn-refresh-classes').addEventListener('click', function() {
    loadClassList().then(function() { showToast('已刷新'); });
  });

  document.getElementById('btn-close-detail').addEventListener('click', function() {
    document.getElementById('class-detail-section').classList.add('hidden');
  });

  // 创建练习
  document.getElementById('btn-create-exercise').addEventListener('click', function() {
    if (!AccountUser.token) { showAccountModal('login'); return; }
    if (AccountUser.role !== 'teacher') { showToast('请使用教师账号登录'); return; }
    if (!TeacherState.currentClassId) { showToast('请先创建班级'); return; }
    var title = document.getElementById('input-ex-title').value.trim();
    var text = document.getElementById('input-ex-text').value.trim();
    var err = document.getElementById('create-ex-error');
    if (!title) { err.textContent = '练习标题不能为空'; err.style.display = 'block'; return; }
    if (!text) { err.textContent = '练习文本不能为空'; err.style.display = 'block'; return; }
    err.style.display = 'none';
    createExercise(title, text).then(function() {
      document.getElementById('input-ex-title').value = '';
      document.getElementById('input-ex-text').value = '';
      document.getElementById('import-file-name').textContent = '';
      document.getElementById('input-ex-file').value = '';
    }).catch(function(e) { err.textContent = e.message; err.style.display = 'block'; });
  });

  // TXT文件导入
  document.getElementById('btn-import-txt').addEventListener('click', function() {
    document.getElementById('input-ex-file').click();
  });
  document.getElementById('input-ex-file').addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('input-ex-text').value = e.target.result;
      document.getElementById('import-file-name').textContent = '已导入：' + file.name;
    };
    reader.onerror = function() {
      showToast('文件读取失败，请重试');
    };
    reader.readAsText(file, 'UTF-8');
  });

  // 刷新练习
  document.getElementById('btn-refresh-exercises').addEventListener('click', function() {
    loadClassInfo().then(function() { showToast('已刷新'); });
  });

  // 刷新看板
  document.getElementById('btn-refresh-dashboard').addEventListener('click', function() {
    loadDashboard().then(function() { showToast('已刷新'); });
  });

  // 刷新宠物排行
  document.getElementById('btn-refresh-pet').addEventListener('click', function() {
    loadPetLeaderboard().then(function() { showToast('已刷新'); });
  });
  // 宠物排行切换
  document.querySelectorAll('.pet-rank-tab').forEach(function(btn) {
    btn.addEventListener('click', function() {
      TeacherState.petRankMode = this.dataset.rank;
      document.querySelectorAll('.pet-rank-tab').forEach(function(b) {
        b.style.background = 'var(--color-bg)';
        b.style.color = 'var(--color-text)';
        b.classList.remove('active');
      });
      this.style.background = '';
      this.style.color = '';
      this.classList.add('active');
      renderPetRanking();
    });
  });

  // 导出CSV
  document.getElementById('btn-export-csv').addEventListener('click', function() {
    exportCSV();
  });

  // 看板学生行点击 → 趋势图（事件委托）
  document.getElementById('dashboard-tbody').addEventListener('click', function(e) {
    var row = e.target.closest('.dashboard-row');
    if (!row) return;
    var studentId = row.dataset.studentId;
    var studentName = row.querySelector('strong').textContent;
    showTrendModal(studentId, studentName);
  });

  // 关闭趋势弹窗
  document.getElementById('btn-trend-close').addEventListener('click', function() {
    document.getElementById('modal-trend').classList.add('hidden');
  });
  document.getElementById('modal-trend').addEventListener('click', function(e) {
    if (e.target === this) this.classList.add('hidden');
  });

  // 编辑学生信息弹窗
  document.getElementById('btn-edit-st-close').addEventListener('click', closeEditStudentModal);
  document.getElementById('btn-edit-st-save').addEventListener('click', saveEditStudent);
  document.getElementById('btn-edit-st-resetpwd').addEventListener('click', resetPasswordInModal);
  document.getElementById('btn-edit-st-remove').addEventListener('click', removeStudentFromModal);
  document.getElementById('modal-edit-student').addEventListener('click', function(e) {
    if (e.target === this) closeEditStudentModal();
  });

  // 班级切换
  document.getElementById('class-switcher-select').addEventListener('change', function() {
    switchClass(this.value);
  });


  // 主题切换
  document.getElementById('btn-theme').addEventListener('click', function(e) {
    e.stopPropagation();
    document.getElementById('theme-popup').classList.toggle('show');
  });
  document.querySelectorAll('.theme-option').forEach(function(opt) {
    opt.addEventListener('click', function(e) {
      e.stopPropagation();
      applyTheme(this.dataset.theme);
      document.getElementById('theme-popup').classList.remove('show');
    });
  });
  document.addEventListener('click', function() {
    document.getElementById('theme-popup').classList.remove('show');
    document.getElementById('account-dropdown').classList.add('hidden');
  });

  // Escape 关闭弹窗
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { hideAccountModal(); }
  });
});
</script>
</body>
</html>

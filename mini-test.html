<!DOCTYPE html><html><head><meta charset="UTF-8"><style>.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;}.hidden{display:none!important;}.account-card{background:#fff;border-radius:14px;padding:28px;width:360px;}.form-input{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:16px;margin-bottom:12px;}.btn{padding:10px 20px;border-radius:20px;border:none;font-size:16px;cursor:pointer;background:#0ea5e9;color:#fff;font-weight:600;}</style></head><body><button id="btn-account" style="float:right;margin:16px;padding:8px 16px;border:1px solid #ddd;border-radius:20px;cursor:pointer;font-size:15px;">👤 未登录 ▾</button><div class="modal-overlay hidden" id="modal-account"><div class="account-card"><h2 style="margin:0 0 16px;">登录</h2><input class="form-input" id="login-user" placeholder="用户名"><input class="form-input" id="login-pass" type="password" placeholder="密码"><button class="btn" id="btn-login-submit">登 录</button><div id="login-error" style="color:red;font-size:13px;margin-top:8px;"></div><button style="margin-top:12px;font-size:13px;" id="btn-close">关闭</button></div></div><script>var AccountUser={token:"",userId:"",username:"",role:""};function showAccountModal(){document.getElementById("modal-account").classList.remove("hidden");}function hideAccountModal(){document.getElementById("modal-account").classList.add("hidden");}document.getElementById("btn-account").addEventListener("click",function(e){e.stopPropagation();showAccountModal();});document.getElementById("btn-close").addEventListener("click",hideAccountModal);document.getElementById("modal-account").addEventListener("click",function(e){if(e.target===this)hideAccountModal();});console.log("Mini test loaded OK");</script></body></html>
